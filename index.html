<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Color Palette</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="title">My Color Palette</h1>

    <div class="palette">
        <div class="color-box c1">#FF6B6B</div>
        <div class="color-box c2">#4ECDC4</div>
        <div class="color-box c3">#1A535C</div>
        <div class="color-box c4">#FFE66D</div>
        <div class="color-box c5">#F7FFF7</div>
    </div>

    <p class="text-box">
        This is a sample text with a background color.
    </p>

</body>
</html>
